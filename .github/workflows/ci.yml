name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          environments: dev
          cache: true
      - run: pixi run -e dev lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          environments: test
          cache: true
      - uses: actions/cache@v4
        with:
          path: ~/.conda/pkgs/cache
          key: repodata-${{ runner.os }}-${{ hashFiles('pixi.lock') }}
          restore-keys: repodata-${{ runner.os }}-
      - run: pixi run -e test test
        timeout-minutes: 5

  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          environments: test
          cache: true
      - uses: actions/cache@v4
        with:
          path: ~/.conda/pkgs/cache
          key: repodata-${{ runner.os }}-${{ hashFiles('pixi.lock') }}
          restore-keys: repodata-${{ runner.os }}-
      - run: pixi run -e test bench
